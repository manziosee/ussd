version: "3.9"

# ── Development overrides ────────────────────────────────────────────────────
# Mount source code for live reload.
# Usage:  docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    volumes:
      - .:/app          # hot-reload: source changes reflected without rebuild
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
