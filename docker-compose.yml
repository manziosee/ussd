version: "3.9"

# ── SmartAssist USSD — Full Stack ─────────────────────────────────────────────
#
# Services
# ────────
#   db          PostgreSQL 16          port 5432
#   redis       Redis 7                port 6379
#   rabbitmq    RabbitMQ 3.12          port 5672 (AMQP) · 15672 (management UI)
#   jasmin      Jasmin SMS gateway     port 1401 (HTTP API) · 2775 (SMPP server)
#   sms-gateway SmartAssist SMS API    port 8001
#   app         SmartAssist USSD app   port 8000
#
# Usage
# ─────
#   Start everything:   docker-compose up -d
#   Development mode:   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#   SMS gateway only:   docker-compose up sms-gateway jasmin rabbitmq redis -d
#
# After first start, configure Jasmin SMPP connectors:
#   docker exec -it smartassist_jasmin jcli
#   (see sms_gateway/README.md for step-by-step connector setup)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: smartassist_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartassist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartassist_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: smartassist_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: jasmin
      RABBITMQ_DEFAULT_PASS: jasmin
    ports:
      - "5672:5672"    # AMQP — Jasmin connects here
      - "15672:15672"  # Management UI — http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Jasmin SMS Gateway ───────────────────────────────────────────────────────

  jasmin:
    image: jookies/jasmin:latest
    container_name: smartassist_jasmin
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Jasmin reads these from environment (overrides jasmin.cfg defaults)
      JASMIN_REDIS_CLIENT_HOST: redis
      JASMIN_REDIS_CLIENT_PORT: "6379"
      JASMIN_AMQP_BROKER_HOST: rabbitmq
      JASMIN_AMQP_BROKER_PORT: "5672"
      JASMIN_AMQP_BROKER_USERNAME: jasmin
      JASMIN_AMQP_BROKER_PASSWORD: jasmin
    ports:
      - "1401:1401"  # Jasmin HTTP API (jHttpApi) — used by sms-gateway
      - "2775:2775"  # SMPP server — telecom operators connect here (inbound)
      - "8990:8990"  # Jasmin CLI (telnet localhost 8990 to configure connectors)
    volumes:
      - jasmin_config:/etc/jasmin
      - jasmin_store:/var/log/jasmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1401/send || true"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── SMS Gateway microservice ─────────────────────────────────────────────────

  sms-gateway:
    build:
      context: ./sms_gateway
      dockerfile: Dockerfile
    container_name: smartassist_sms_gateway
    restart: unless-stopped
    depends_on:
      jasmin:
        condition: service_started
    env_file:
      - .env
    environment:
      # Override with Docker-internal hostnames
      SMS_GW_JASMIN_HOST: jasmin
      SMS_GW_JASMIN_HTTP_PORT: "1401"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Main USSD App ────────────────────────────────────────────────────────────

  app:
    build: .
    container_name: smartassist_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      sms-gateway:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Docker-internal hostnames override .env values
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/smartassist
      REDIS_URL: redis://redis:6379/0
      SMS_GATEWAY_URL: http://sms-gateway:8001
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  jasmin_config:
  jasmin_store:
