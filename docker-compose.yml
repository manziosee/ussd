version: "3.9"

# ── Production Compose ───────────────────────────────────────────────────────
# Builds the app image from the local Dockerfile.
# Override DATABASE_URL / REDIS_URL if using external services (e.g. Neon, Upstash).
#
# Development hot-reload:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: smartassist_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartassist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartassist_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: smartassist_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override with Docker-internal hostnames (overrides .env values)
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/smartassist
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # NOTE: No source-code volume mount here — the image contains the app.
    # For hot-reload in development, use docker-compose.dev.yml.

volumes:
  postgres_data:
  redis_data:
